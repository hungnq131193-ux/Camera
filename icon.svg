<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Nền bo tròn (maskable safe zone ~40px lề) -->
  <rect width="512" height="512" rx="96" fill="#0b0b0b"/>
  <!-- Thân máy ảnh -->
  <rect x="96" y="176" width="320" height="216" rx="32" fill="#1f2937"/>
  <!-- Phần nhô của viewfinder -->
  <path d="M196 176 l24 -36 h72 l24 36 z" fill="#1f2937"/>
  <!-- Ống kính ngoài -->
  <circle cx="256" cy="288" r="78" fill="#111827" stroke="#38bdf8" stroke-width="10"/>
  <!-- Ống kính trong -->
  <circle cx="256" cy="288" r="46" fill="#0ea5e9"/>
  <circle cx="256" cy="288" r="22" fill="#e0f2fe"/>
  <!-- Điểm sáng phản chiếu -->
  <circle cx="238" cy="270" r="9" fill="#ffffff" opacity="0.85"/>
  <!-- Đèn flash -->
  <rect x="352" y="200" width="34" height="20" rx="6" fill="#38bdf8"/>
</svg>
